<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - 500 Error</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 80px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 4px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        #result {
            margin-top: 20px;
            padding: 12px;
            border-radius: 4px;
            display: none;
        }
        #result.error {
            background: #fde8e8;
            border: 1px solid #f44336;
            color: #c62828;
        }
    </style>
</head>
<body>
    <h1>Login</h1>
    <form id="login-form">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter username" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password" required>
        </div>
        <button type="submit">Login</button>
    </form>
    <div id="result"></div>

    <script>
        function buildJwt(username) {
            const header = btoa(JSON.stringify({ alg: 'HS256', typ: 'JWT' }));
            const payload = btoa(JSON.stringify({
                sub: username,
                iat: Math.floor(Date.now() / 1000),
                exp: Math.floor(Date.now() / 1000) + 3600
            }));
            const signature = 'fakesignature';
            return `${header}.${payload}.${signature}`;
        }

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const token = buildJwt(username);

            const xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://httpstat.us/500');
            xhr.setRequestHeader('Authorization', `Bearer ${token}`);
            xhr.setRequestHeader('Content-Type', 'application/json');

            xhr.onload = function() {
                const result = document.getElementById('result');
                result.className = 'error';
                result.textContent = `Error: server responded with status ${xhr.status}`;
                result.style.display = 'block';
            };

            xhr.onerror = function() {
                const result = document.getElementById('result');
                result.className = 'error';
                result.textContent = 'Error: network request failed';
                result.style.display = 'block';
            };

            xhr.send(JSON.stringify({ username }));
        });
    </script>
</body>
</html>
